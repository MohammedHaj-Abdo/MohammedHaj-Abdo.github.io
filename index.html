<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق محمد الأول للهواتف</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
        }
        .instruction-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 80%;
            border: 1px solid #ffeeba;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- صندوق الإرشادات الذكي الذي يقرأه قارئ الشاشة فوراً -->
    <div class="instruction-box" id="guide">
        نصيحة لتجربة أفضل: اضغط على زر "مشاركة" أسفل المتصفح، ثم اختر "إضافة إلى الشاشة الرئيسية" ليعمل هذا الملف كتطبيق مستقل على هاتفك!
    </div>

    <h1>مرحباً بك في مرحبا بكم بتطبيقي الأول للهواتف</h1>
    
    <button id="btn" aria-label="زر تجربة التطبيق">اضغط لتجربة التطبيق</button>

    <script>
        // كود الجافا سكريبت للزر
        document.getElementById('btn').onclick = function() {
            alert('مرحبا بكم بهذا التطبيق البسيط جدا لأول مرة للهواتف من Tech Master Explorer وإن شاء الله مستقبلا سترو تطبيقاتي على المتاجر سواء App store وحتى Google play.');
        };

        // حركة برمجية ذكية: إذا فتح المستخدم التطبيق من الشاشة الرئيسية (بعد تثبيته)، قم بإخفاء صندوق الإرشادات لأنه لم يعد بحاجة إليه!
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('guide').style.display = 'none';
        }
    </script>

</body>
</html>
